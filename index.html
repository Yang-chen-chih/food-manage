<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>食材小管家</title>
    <link rel="icon" href="foodicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --theme: #D9A05B;
            --bg: #F5EFE6;
            --card: #FFFBF5;
            --border: #E8DFD0;
            --muted: #8E8171;
            --text: #4A443C;
        }

        * { -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.6) 0%, transparent 80%);
            background-attachment: fixed;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .card { background: var(--card); border-radius: 1.25rem; box-shadow: 0 4px 20px rgba(139,115,85,0.06); border: 1px solid rgba(217,160,91,0.15); }
        .input { width: 100%; padding: 0.875rem 1rem; border-radius: 0.75rem; border: 1.5px solid var(--border); background: #fff; font-size: 16px; -webkit-appearance: none; transition: all 0.2s ease; outline: none; }
        .input:focus { border-color: var(--theme); box-shadow: 0 0 0 3px rgba(217,160,91,0.1); }

        .app-title { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1.75rem; font-weight: 800; color: var(--theme); }
        
        .list-card {
            background: var(--card);
            border: 1px solid rgba(217,160,91,0.1);
            border-radius: 1.25rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .list-card.editing {
            border-color: var(--theme);
            background: #fff;
            box-shadow: 0 10px 25px rgba(139,115,85,0.15);
            transform: scale(1.02);
            z-index: 20;
        }

        .info-tag { display: flex; align-items: center; font-size: 0.8rem; color: var(--muted); background: rgba(232,223,208,0.3); padding: 2px 8px; border-radius: 6px; width: fit-content; }

        .counter-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; background: #fff; border: 1px solid var(--border);
            color: var(--theme); cursor: pointer; -webkit-appearance: none;
            transition: all 0.2s;
        }
        .counter-btn:active { background: var(--theme); color: white; transform: scale(0.9); }

        .edit-field { margin-bottom: 0.75rem; }
        .edit-label { font-size: 0.75rem; font-weight: 700; color: var(--theme); margin-bottom: 2px; display: block; opacity: 0.8; }
        .edit-input { background: #fff; border: 1.5px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; outline: none; width: 100%; font-size: 16px; color: var(--text); -webkit-appearance: none; transition: border-color 0.2s; }
        .edit-input:focus { border-color: var(--theme); }

        .search-container {
            position: relative; background: #fff; border-radius: 1.25rem;
            box-shadow: 0 4px 12px rgba(139,115,85,0.1);
            border: 2px solid rgba(217,160,91,0.2); transition: all 0.3s ease;
        }
        .search-container:focus-within { border-color: var(--theme); }

        .search-input { width: 100%; padding: 1rem 1rem 1rem 3.25rem; border: none; background: transparent; outline: none; font-size: 16px; -webkit-appearance: none; }

        #cameraContainer { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; }
        #cameraStream { width: 100%; height: 100%; object-fit: cover; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #foodList { -webkit-overflow-scrolling: touch; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 20px; border-radius: 8px; max-width: 300px;
            font-size: 14px; z-index: 999; animation: slideUp 0.3s ease;
        }

        .toast.success { background: #4CAF50; color: white; }
        .toast.error { background: #f44336; color: white; }
        .toast.info { background: var(--theme); color: white; }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .status-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }
        .status-indicator.online { background: #4CAF50; }
        .status-indicator.offline { background: #f44336; }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-[#D9A05B] border-t-transparent mb-4"></div>
        <p style="color: var(--theme)" class="font-bold tracking-widest">載入中</p>
    </div>

    <div id="cameraContainer">
        <video id="cameraStream" autoplay playsinline muted></video>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-10">
            <button type="button" onclick="app.takeSnapshot()" class="bg-white text-orange-500 w-16 h-16 rounded-full shadow-2xl flex items-center justify-center active:scale-90 border-4 border-orange-100">
                <i class="fas fa-camera text-2xl"></i>
            </button>
            <button type="button" onclick="app.stopCamera()" class="bg-gray-800/80 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center active:scale-90">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
    </div>

    <div class="max-w-xl mx-auto min-h-screen px-5 py-8 pb-20">
        <header class="text-center mb-8 flex items-center justify-center gap-4">
            <div class="app-title">
                <i class="fas fa-carrot"></i> 食材小管家
            </div>
            <div id="connectionStatus" class="text-xs flex items-center" style="color: var(--muted);">
                <span class="status-indicator online"></span>
                <span id="statusText">連線中</span>
            </div>
        </header>

        <section class="card p-6 mb-8">
            <h2 class="text-md font-bold mb-5 flex items-center gap-2" style="color: var(--theme); border-bottom: 1px solid rgba(217,160,91,0.2); padding-bottom: 0.75rem;">
                <i class="fas fa-plus-circle"></i> 新增食材
            </h2>
            <form id="foodForm" class="space-y-4" onsubmit="return false;">
                <div>
                    <label class="text-xs font-bold text-gray-400 mb-1 block">名稱</label>
                    <input type="text" id="foodName" class="input" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">購買日期</label>
                        <input type="date" id="foodDate" class="input text-gray-600">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">價格</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                            <input type="number" id="foodPrice" placeholder="0" class="input pl-7">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">存放地點</label>
                        <input type="text" id="foodLocation" class="input">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">初始數量</label>
                        <input type="number" id="foodQuantity" value="1" min="1" class="input">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 mb-1 block">備註</label>
                    <textarea id="foodNote" placeholder="補充說明..." class="input h-20 resize-none"></textarea>
                </div>

                <div class="pt-2">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-xs font-bold text-gray-400">照片</label>
                        <button type="button" onclick="app.triggerCamera('add')" style="color: var(--theme); background-color: rgba(217,160,91,0.1)" class="text-sm font-bold px-4 py-2 rounded-full active:opacity-80">
                            <i class="fas fa-camera mr-1"></i> 相機拍攝
                        </button>
                    </div>
                    <div id="dropZone" onclick="document.getElementById('imageInput').click()"
                        style="border-color: var(--border)"
                        class="h-40 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D9A05B] transition-all bg-white/60 overflow-hidden relative shadow-sm">
                        <div id="uploadPlaceholder" class="text-center">
                            <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-2">
                                <i class="fas fa-image text-orange-300 text-lg"></i>
                            </div>
                            <p class="text-xs text-gray-400 font-medium">點擊或拖曳上傳照片</p>
                        </div>
                        <img id="imagePreview" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                </div>

                <button type="button" id="submitBtn" onclick="app.submitForm()" style="background-color: var(--theme)" class="w-full text-white font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 mt-6 text-lg">
                    <span id="submitBtnText">確認上傳</span>
                    <i class="fas fa-check-circle"></i>
                </button>
            </form>
        </section>

        <div class="mb-6">
            <div class="search-container">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋食材、存放地或備註..." class="search-input">
            </div>
        </div>

        <div id="foodList" class="space-y-4"></div>

        <div id="emptyState" class="hidden py-20 text-center">
            <div class="bg-orange-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-orange-100">
                <i class="fas fa-box-open text-orange-200 text-3xl"></i>
            </div>
            <p class="text-gray-400 font-medium">還沒有食材記錄喔</p>
        </div>
    </div>

    <input type="file" id="editImageInput" accept="image/*" class="hidden">

    <script>
        const SUPABASE_URL = 'https://eqjrudcgmryavwbjaecm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxanJ1ZGNnbXJ5YXZ3YmphZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjkzODgsImV4cCI6MjA4NzAwNTM4OH0.Tl9UvO41jlRPRmfw-bA6t5s_qMKQjHAfINUJRoRnB4A';
        
        // Supabase 客戶端配置（防止凍結）
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false },
            realtime: { params: { eventsPerSecond: 10 } },
            db: { schema: 'public' }
        });

        const app = {
            items: [],
            filtered: [],
            currentImage: null,
            editImage: null,
            stream: null,
            editId: null,
            cameraTarget: 'add',
            isOnline: true,
            syncTimeout: null,

            // ===== 工具函數 =====
            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            updateConnectionStatus(online) {
                this.isOnline = online;
                const statusIndicator = document.querySelector('.status-indicator');
                const statusText = document.getElementById('statusText');
                if (online) {
                    statusIndicator.classList.remove('offline');
                    statusIndicator.classList.add('online');
                    statusText.textContent = '連線中';
                } else {
                    statusIndicator.classList.remove('online');
                    statusIndicator.classList.add('offline');
                    statusText.textContent = '離線中';
                }
            },

            // 帶重試機制的 API 調用
            async withRetry(fn, maxRetries = 3, delay = 1000) {
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        return await Promise.race([
                            fn(),
                            new Promise((_, reject) => 
                                setTimeout(() => reject(new Error('超時')), 10000)
                            )
                        ]);
                    } catch (error) {
                        if (i === maxRetries - 1) throw error;
                        await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
                    }
                }
            },

            // ===== 初始化與監控 =====
            async init() {
                try {
                    this.withRetry(async () => {
                        const { data, error } = await db.from('foods')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        this.items = data || [];
                        this.filtered = [...this.items];
                        this.updateConnectionStatus(true);
                    });
                    
                    this.render();
                    document.getElementById('loadingOverlay').style.display = 'none';
                } catch (error) {
                    console.error('初始化失敗:', error);
                    this.updateConnectionStatus(false);
                    this.showToast('無法連接到數據庫，請檢查網絡', 'error');
                }
            },

            // 心跳檢測
            startHeartbeat() {
                setInterval(async () => {
                    try {
                        await Promise.race([
                            db.from('foods').select('id').limit(1),
                            new Promise((_, reject) => 
                                setTimeout(() => reject(new Error('心跳超時')), 5000)
                            )
                        ]);
                        this.updateConnectionStatus(true);
                    } catch (error) {
                        this.updateConnectionStatus(false);
                    }
                }, 30000); // 每 30 秒檢查一次
            },

            // ===== 相機功能 =====
            async triggerCamera(target) {
                this.cameraTarget = target;
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' }, 
                        audio: false 
                    });
                    const video = document.getElementById('cameraStream');
                    video.srcObject = this.stream;
                    video.onloadedmetadata = () => video.play();
                    document.getElementById('cameraContainer').style.display = 'block';
                } catch (err) {
                    this.showToast('無法啟動相機', 'error');
                }
            },

            stopCamera() {
                if (this.stream) {
                    this.stream.getTracks().forEach(t => t.stop());
                    this.stream = null;
                }
                document.getElementById('cameraContainer').style.display = 'none';
            },

            takeSnapshot() {
                const video = document.getElementById('cameraStream');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

                if (this.cameraTarget === 'add') {
                    this.currentImage = dataUrl;
                    this.updateImagePreview('imagePreview', dataUrl);
                } else {
                    this.editImage = dataUrl;
                    const preview = document.getElementById(`editPreview-${this.editId}`);
                    if (preview) preview.src = dataUrl;
                }
                this.stopCamera();
            },

            updateImagePreview(previewId, dataUrl) {
                const preview = document.getElementById(previewId);
                const placeholder = document.getElementById('uploadPlaceholder');
                preview.src = dataUrl;
                preview.classList.remove('hidden');
                if (placeholder) placeholder.classList.add('hidden');
            },

            // ===== 表單操作 =====
            async submitForm() {
                const name = document.getElementById('foodName').value;
                if (!name) {
                    this.showToast('請填寫名稱', 'error');
                    return;
                }

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                const originalText = document.getElementById('submitBtnText').textContent;
                document.getElementById('submitBtnText').textContent = '上傳中...';

                const payload = {
                    name,
                    date: document.getElementById('foodDate').value || null,
                    price: parseInt(document.getElementById('foodPrice').value) || 0,
                    location: document.getElementById('foodLocation').value || '',
                    quantity: parseInt(document.getElementById('foodQuantity').value) || 1,
                    note: document.getElementById('foodNote').value || '',
                    image: this.currentImage,
                    created_at: new Date().toISOString()
                };

                try {
                    await this.withRetry(async () => {
                        const { error } = await db.from('foods').insert([payload]);
                        if (error) throw error;
                    });

                    document.getElementById('foodForm').reset();
                    this.currentImage = null;
                    document.getElementById('imagePreview').classList.add('hidden');
                    document.getElementById('uploadPlaceholder').classList.remove('hidden');
                    this.showToast('新增成功！', 'success');
                    await this.loadItems(); // 只載入新項目
                } catch (error) {
                    console.error('新增失敗:', error);
                    this.showToast('新增失敗，請重試', 'error');
                } finally {
                    btn.disabled = false;
                    document.getElementById('submitBtnText').textContent = originalText;
                }
            },

            // ===== 編輯操作 =====
            toggleEdit(id) {
                if (this.editId === id) return;
                this.editId = id;
                const item = this.items.find(i => i.id === id);
                this.editImage = item.image;
                this.render();
            },

            cancelEdit(e) {
                e.stopPropagation();
                this.editId = null;
                this.editImage = null;
                this.render();
            },

            async saveEdit(e, id) {
                e.stopPropagation();
                const card = document.querySelector(`.list-card[data-id="${id}"]`);
                const update = {
                    name: card.querySelector('.edit-name').value,
                    date: card.querySelector('.edit-date').value || null,
                    price: parseInt(card.querySelector('.edit-price').value) || 0,
                    location: card.querySelector('.edit-location').value,
                    note: card.querySelector('.edit-note').value,
                    image: this.editImage,
                    updated_at: new Date().toISOString()
                };

                try {
                    await this.withRetry(async () => {
                        const { error } = await db.from('foods').update(update).eq('id', id);
                        if (error) throw error;
                    });

                    // 樂觀更新本地數據
                    const itemIndex = this.items.findIndex(i => i.id === id);
                    if (itemIndex !== -1) {
                        this.items[itemIndex] = { ...this.items[itemIndex], ...update };
                        this.filtered = [...this.items];
                    }

                    this.editId = null;
                    this.editImage = null;
                    this.showToast('修改成功！', 'success');
                    this.render();
                } catch (error) {
                    console.error('保存失敗:', error);
                    this.showToast('保存失敗，請重試', 'error');
                }
            },

            // ===== 數量與刪除操作 =====
            async updateQty(e, id, delta) {
                e.stopPropagation();
                const item = this.items.find(x => x.id === id);
                if (!item) return;

                const newQty = Math.max(0, item.quantity + delta);
                const oldQty = item.quantity;
                
                // 樂觀更新
                item.quantity = newQty;
                this.render();

                try {
                    await this.withRetry(async () => {
                        const { error } = await db.from('foods').update({ quantity: newQty }).eq('id', id);
                        if (error) throw error;
                    });
                } catch (error) {
                    // 回滾
                    item.quantity = oldQty;
                    this.render();
                    this.showToast('更新失敗，請重試', 'error');
                }
            },

            async deleteItem(e, id) {
                e.stopPropagation();
                if (!confirm('確定刪除？')) return;

                try {
                    await this.withRetry(async () => {
                        const { error } = await db.from('foods').delete().eq('id', id);
                        if (error) throw error;
                    });

                    this.items = this.items.filter(i => i.id !== id);
                    this.filtered = [...this.items];
                    this.showToast('刪除成功！', 'success');
                    this.render();
                } catch (error) {
                    console.error('刪除失敗:', error);
                    this.showToast('刪除失敗，請重試', 'error');
                }
            },

            // ===== 搜尋與載入 =====
            async loadItems() {
                try {
                    await this.withRetry(async () => {
                        const { data, error } = await db.from('foods')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        this.items = data || [];
                        this.filtered = [...this.items];
                    });
                } catch (error) {
                    console.error('載入失敗:', error);
                }
            },

            search(keyword) {
                const k = keyword.toLowerCase().trim();
                this.filtered = this.items.filter(i =>
                    (i.name?.toLowerCase().includes(k)) ||
                    (i.location?.toLowerCase().includes(k)) ||
                    (i.note?.toLowerCase().includes(k))
                );
                this.render();
            },

            // ===== 渲染函數 =====
            renderEditCard(item) {
                return `
                <div class="list-card editing p-5" data-id="${item.id}">
                    <div class="flex gap-4 mb-4">
                        <div class="w-24 h-24 bg-orange-50 rounded-xl overflow-hidden flex-shrink-0 relative group border-2 border-orange-100">
                            <img id="editPreview-${item.id}" src="${this.editImage || ''}" class="w-full h-full object-cover ${!this.editImage ? 'hidden' : ''}">
                            <div class="w-full h-full flex flex-col items-center justify-center text-orange-300 ${this.editImage ? 'hidden' : ''}">
                                <i class="fas fa-image text-xl"></i>
                            </div>
                            <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="app.triggerCamera('edit')" class="text-white text-[10px] mb-1 font-bold"><i class="fas fa-camera mr-1"></i>拍攝</button>
                                <button onclick="document.getElementById('editImageInput').click()" class="text-white text-[10px] font-bold"><i class="fas fa-folder mr-1"></i>相簿</button>
                            </div>
                        </div>
                        <div class="flex-1">
                            <div class="edit-field">
                                <label class="edit-label">食材名稱</label>
                                <input type="text" class="edit-name edit-input font-bold" value="${item.name}">
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div class="edit-field">
                            <label class="edit-label">日期</label>
                            <input type="date" class="edit-date edit-input" value="${item.date || ''}">
                        </div>
                        <div class="edit-field">
                            <label class="edit-label">價格</label>
                            <input type="number" class="edit-price edit-input" value="${item.price || 0}">
                        </div>
                    </div>
                    <div class="edit-field mb-3">
                        <label class="edit-label">存放地點</label>
                        <input type="text" class="edit-location edit-input" value="${item.location || ''}">
                    </div>
                    <div class="edit-field">
                        <label class="edit-label">備註</label>
                        <textarea class="edit-note edit-input h-16" placeholder="寫點什麼...">${item.note || ''}</textarea>
                    </div>
                    <div class="mt-5 flex gap-3">
                        <button onclick="app.cancelEdit(event)" class="flex-1 py-3 rounded-xl font-bold bg-gray-100 text-gray-500 active:bg-gray-200">取消</button>
                        <button onclick="app.saveEdit(event, ${item.id})" style="background-color: var(--theme)" class="flex-1 py-3 rounded-xl font-bold text-white shadow-md active:opacity-90">儲存修改</button>
                    </div>
                </div>`;
            },

            renderItemCard(item) {
                return `
                <div class="list-card p-4" data-id="${item.id}" onclick="app.toggleEdit(${item.id})">
                    <button onclick="app.deleteItem(event, ${item.id})" class="absolute top-3 right-3 text-gray-300 p-2"><i class="fas fa-trash-alt text-sm"></i></button>
                    <div class="flex gap-4">
                        <div class="w-20 h-20 bg-orange-50 rounded-xl overflow-hidden flex-shrink-0 border border-orange-100/50">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-orange-200"><i class="fas fa-utensils text-xl"></i></div>`}
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-gray-800 pr-6 truncate">${item.name}</h3>
                                <div class="flex flex-wrap gap-2 mt-1">
                                    <div class="info-tag text-[10px]"><i class="far fa-calendar-alt mr-1"></i>${item.date || '未設定'}</div>
                                    <div class="info-tag text-[10px]"><i class="fas fa-map-marker-alt mr-1"></i>${item.location || '未設定'}</div>
                                </div>
                            </div>
                            <div class="flex justify-between items-end mt-2">
                                <div style="color: var(--theme)" class="font-black text-lg"><small class="text-xs mr-0.5">$</small>${item.price}</div>
                                <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border border-orange-100">
                                    <button onclick="app.updateQty(event, ${item.id}, -1)" class="counter-btn text-[10px]"><i class="fas fa-minus"></i></button>
                                    <span class="font-bold text-sm w-5 text-center">${item.quantity || 0}</span>
                                    <button onclick="app.updateQty(event, ${item.id}, 1)" class="counter-btn text-[10px]"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            },

            render() {
                const container = document.getElementById('foodList');
                if (this.filtered.length === 0) {
                    container.innerHTML = '';
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }
                document.getElementById('emptyState').classList.add('hidden');
                container.innerHTML = this.filtered
                    .map(item => this.editId === item.id ? this.renderEditCard(item) : this.renderItemCard(item))
                    .join('');
            }
        };

        // ===== 事件監聽 =====
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // 檢查檔案大小（限制 2MB）
                if (file.size > 2 * 1024 * 1024) {
                    app.showToast('圖片太大，請選擇小於 2MB 的圖片', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    app.currentImage = ev.target.result;
                    app.updateImagePreview('imagePreview', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('editImageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    app.showToast('圖片太大，請選擇小於 2MB 的圖片', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    app.editImage = ev.target.result;
                    const preview = document.getElementById(`editPreview-${app.editId}`);
                    if (preview) preview.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            app.search(e.target.value);
        });

        // ===== 啟動應用 =====
        app.init();
        app.startHeartbeat();

        // 監聽網絡狀態
        window.addEventListener('online', () => {
            app.updateConnectionStatus(true);
            app.showToast('連線已恢復', 'success');
        });

        window.addEventListener('offline', () => {
            app.updateConnectionStatus(false);
            app.showToast('已離線模式', 'error');
        });
    </script>
</body>
</html>
