<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食材管理系統</title>
    <link rel="icon" href="foodicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --theme-color: #D9A05B; 
            --bg-color: #F9F7F2; /* 奶油白背景 */
            --input-border: #E5E7EB;
            --text-muted: #9CA3AF;
        } 
        
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            background-attachment: fixed;
            color: #4B5563;
        }

        .theme-text { color: var(--theme-color); }
        .theme-bg { background-color: var(--theme-color); }
        
        /* 標題樣式 */
        .app-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-color);
        }

        /* 紮實的卡片設計 */
        .solid-card {
            background: #FFFFFF;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        /* 輸入框樣式 */
        .custom-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--input-border);
            background: transparent;
            transition: all 0.2s;
            outline: none;
        }
        .custom-input:focus {
            border-color: var(--theme-color);
            box-shadow: 0 0 0 2px rgba(217, 160, 91, 0.1);
        }

        .label-text {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        #imageInput { display: none; }
        
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.4s;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="font-sans">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#D9A05B] border-t-transparent mb-4"></div>
        <p class="theme-text font-medium text-sm">正在連線至雲端資料庫...</p>
    </div>

    <div class="max-w-2xl mx-auto min-h-screen px-4 py-12">
        <header class="text-center mb-10">
            <div class="app-title">
                <i class="fas fa-leaf text-3xl"></i> 食材管理
            </div>
        </header>

        <!-- 新增區塊 (紮實卡片) -->
        <section class="solid-card p-8 mb-8 animate-fadeIn">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 theme-text">
                <i class="fas fa-plus-circle"></i> 新增食材
            </h2>
            <form id="foodForm" class="space-y-5">
                <div>
                    <label class="label-text">食材名稱</label>
                    <input type="text" id="foodName" placeholder="點擊輸入" class="custom-input">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="label-text">購買日期</label>
                        <input type="date" id="foodDate" class="custom-input">
                    </div>
                    <div>
                        <label class="label-text">價格</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">$</span>
                            <input type="text" id="foodPrice" placeholder="0" class="custom-input pl-7">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="label-text">存放地方</label>
                    <input type="text" id="foodLocation" placeholder="點擊輸入" class="custom-input">
                </div>

                <div>
                    <label class="label-text">圖片支援</label>
                    <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
                        class="h-40 border-2 border-dashed border-gray-100 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D9A05B] transition-colors overflow-hidden bg-gray-50/50">
                        <div id="uploadPlaceholder" class="text-center">
                            <i class="fas fa-camera text-gray-300 text-3xl mb-2"></i>
                            <p class="text-xs text-gray-400">點擊上傳圖片</p>
                        </div>
                        <img id="imagePreview" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <button type="submit" id="submitBtn" class="w-full theme-bg text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 hover:brightness-105">
                    上傳
                </button>
            </form>
        </section>

        <!-- 列表區塊 -->
        <div id="foodList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        
        <div id="emptyState" class="hidden py-16 text-center">
            <i class="fas fa-box-open mx-auto text-gray-200 text-5xl mb-3"></i>
            <p class="text-gray-400 italic text-sm">目前沒有任何食材記錄</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eqjrudcgmryavwbjaecm.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxanJ1ZGNnbXJ5YXZ3YmphZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjkzODgsImV4cCI6MjA4NzAwNTM4OH0.Tl9UvO41jlRPRmfw-bA6t5s_qMKQjHAfINUJRoRnB4A';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let items = [];
        let currentImageData = null;

        const foodForm = document.getElementById('foodForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const foodList = document.getElementById('foodList');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');

        async function init() {
            try {
                const { data, error } = await supabaseClient
                    .from('foods')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                items = data || [];
                renderItems();
                
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 400);

                // 實時更新
                supabaseClient
                    .channel('schema-db-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'foods' }, payload => {
                        if (payload.eventType === 'INSERT') items.unshift(payload.new);
                        if (payload.eventType === 'DELETE') items = items.filter(i => i.id !== payload.old.id);
                        if (payload.eventType === 'UPDATE') {
                            const idx = items.findIndex(i => i.id === payload.new.id);
                            if (idx !== -1) items[idx] = payload.new;
                        }
                        renderItems();
                    })
                    .subscribe();

            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 1024 * 1024) { alert("圖片請小於 1MB"); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageData = ev.target.result;
                    imagePreview.src = currentImageData;
                    imagePreview.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        foodForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> 處理中...';

            const payload = {
                name: document.getElementById('foodName').value || "未命名食材",
                date: document.getElementById('foodDate').value || null,
                price: document.getElementById('foodPrice').value || "0",
                location: document.getElementById('foodLocation').value || "",
                image: currentImageData
            };

            const { error } = await supabaseClient.from('foods').insert([payload]);

            if (error) {
                alert("儲存失敗: " + error.message);
            } else {
                foodForm.reset();
                currentImageData = null;
                imagePreview.classList.add('hidden');
                uploadPlaceholder.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.innerHTML = '儲存食材';
        });

        window.deleteItem = async (id) => {
            if (!confirm('確定要刪除這筆記錄嗎？')) return;
            await supabaseClient.from('foods').delete().eq('id', id);
        };

        function renderItems() {
            if (items.length === 0) {
                foodList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            foodList.innerHTML = items.map(item => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex gap-4 animate-fadeIn">
                    <div class="w-20 h-20 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-200"><i class="fas fa-utensils"></i></div>`}
                    </div>
                    <div class="flex-1 flex flex-col justify-between overflow-hidden">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-gray-700 truncate">${item.name}</h3>
                                <button onclick="deleteItem(${item.id})" class="text-gray-300 hover:text-red-400"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="text-[14px] text-gray-400 mt-1 flex flex-wrap gap-x-3">
                                <span><i class="far fa-calendar-alt mr-1"></i>${item.date || '未註記'}</span>
                                <span><i class="fas fa-map-marker-alt mr-1"></i>${item.location || '未註記'}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end mt-2">
                            <span class="font-bold theme-text">$${item.price}</span>
                            <span class="text-[10px] bg-gray-50 px-2 py-0.5 rounded text-gray-400 border border-gray-100">在庫</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
