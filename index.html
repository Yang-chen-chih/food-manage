<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食材管理系統</title>
    <link rel="icon" href="foodicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --theme-color: #D9A05B; 
            --bg-color: #F5EFE6; 
            --card-bg: #FFFBF5;
            --input-border: #E8DFD0;
            --text-muted: #A39684;
        } 
        
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.5) 0%, transparent 75%);
            background-attachment: fixed;
            color: #5D5448;
        }

        .theme-text { color: var(--theme-color); }
        .theme-bg { background-color: var(--theme-color); }
        
        .app-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-color);
        }

        .solid-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.08);
            border: 1px solid rgba(217, 160, 91, 0.1);
        }

        .custom-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--input-border);
            background: #FFFFFF;
            transition: all 0.2s;
            outline: none;
        }
        .custom-input:focus {
            border-color: var(--theme-color);
            box-shadow: 0 0 0 3px rgba(217, 160, 91, 0.15);
        }

        .label-text {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        #imageInput { display: none; }
        
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.4s;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .list-card {
            background: var(--card-bg);
            border: 1px solid rgba(217, 160, 91, 0.08);
            transition: transform 0.2s;
        }
        .list-card:active {
            transform: scale(0.98);
        }

        /* 相機預覽容器 */
        #cameraContainer {
            display: none;
            position: relative;
            width: 100%;
            height: 240px;
            background: #000;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        #cameraStream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="font-sans">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#D9A05B] border-t-transparent mb-4"></div>
        <p class="theme-text font-medium text-sm"更新中</p>
    </div>

    <div class="max-w-2xl mx-auto min-h-screen px-4 py-12">
        <header class="text-center mb-10">
            <div class="app-title">
                <i class="fas fa-utensils text-3xl"></i> 食材管理
            </div>
        </header>

        <section class="solid-card p-8 mb-8 animate-fadeIn">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 theme-text">
                <i class="fas fa-plus-circle"></i> 新增食材
            </h2>
            <form id="foodForm" class="space-y-5">
                <div>
                    <label class="label-text">食材名稱</label>
                    <input type="text" id="foodName" placeholder="點擊輸入" class="custom-input">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="label-text">購買日期</label>
                        <input type="date" id="foodDate" class="custom-input">
                    </div>
                    <div>
                        <label class="label-text">價格</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-gray-400">$</span>
                            <input type="number" id="foodPrice" placeholder="0" class="custom-input pl-7">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="label-text">存放地方</label>
                    <input type="text" id="foodLocation" placeholder="點擊輸入" class="custom-input">
                </div>

                <div>
                    <label class="label-text">備註</label>
                    <textarea id="foodNote" placeholder="補充說明..." class="custom-input h-20 resize-none"></textarea>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="label-text mb-0">圖片支援</label>
                        <div class="flex gap-2">
                            <button type="button" onclick="startCamera()" class="text-xs bg-white border border-[#E8DFD0] px-3 py-1 rounded-full text-gray-500 hover:border-[#D9A05B] hover:text-[#D9A05B] transition-all">
                                <i class="fas fa-camera mr-1"></i> 開啟相機
                            </button>
                        </div>
                    </div>

                    <!-- 相機預覽區 -->
                    <div id="cameraContainer" class="mb-2">
                        <video id="cameraStream" autoplay playsinline></video>
                        <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-4">
                            <button type="button" onclick="takeSnapshot()" class="bg-white text-gray-800 w-12 h-12 rounded-full shadow-lg flex items-center justify-center">
                                <i class="fas fa-camera text-xl"></i>
                            </button>
                            <button type="button" onclick="stopCamera()" class="bg-red-500 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 圖片預覽/上傳點擊區 -->
                    <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
                        class="h-40 border-2 border-dashed border-[#E8DFD0] rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D9A05B] transition-colors overflow-hidden bg-[#FFFFFF]/50 relative">
                        <div id="uploadPlaceholder" class="text-center">
                            <i class="fas fa-image text-gray-300 text-3xl mb-2"></i>
                            <p class="text-xs text-gray-400">點擊上傳</p>
                        </div>
                        <img id="imagePreview" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <button type="submit" id="submitBtn" class="w-full theme-bg text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 hover:brightness-105">
                    <span id="btnText">上傳</span>
                    <i id="btnIcon" class="fas fa-cloud-upload-alt"></i>
                </button>
            </form>
        </section>

        <div class="mb-6 animate-fadeIn" style="animation-delay: 0.1s;">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋名稱、存放地方、日期或備註..." 
                    class="custom-input pl-12 shadow-sm border-none bg-white/80 backdrop-blur-sm">
            </div>
        </div>

        <div id="foodList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        
        <div id="emptyState" class="hidden py-16 text-center">
            <i class="fas fa-box-open mx-auto text-gray-300 text-5xl mb-3"></i>
            <p class="text-gray-400 italic text-sm">空空如也>_<</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eqjrudcgmryavwbjaecm.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxanJ1ZGNnbXJ5YXZ3YmphZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjkzODgsImV4cCI6MjA4NzAwNTM4OH0.Tl9UvO41jlRPRmfw-bA6t5s_qMKQjHAfINUJRoRnB4A';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let items = [];
        let filteredItems = [];
        let currentImageData = null;
        let stream = null;

        const foodForm = document.getElementById('foodForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const foodList = document.getElementById('foodList');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const searchInput = document.getElementById('searchInput');
        const cameraContainer = document.getElementById('cameraContainer');
        const cameraStream = document.getElementById('cameraStream');
        const dropZone = document.getElementById('dropZone');

        async function init() {
            try {
                const { data, error } = await supabaseClient
                    .from('foods')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                items = data || [];
                filteredItems = [...items];
                renderItems();
                
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 400);

            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }

        // 相機功能
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                cameraStream.srcObject = stream;
                cameraContainer.style.display = 'block';
                dropZone.style.display = 'none';
            } catch (err) {
                alert("無法開啟相機，請檢查瀏覽器權限設置。");
                console.error(err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            cameraContainer.style.display = 'none';
            dropZone.style.display = 'flex';
        }

        function takeSnapshot() {
            const canvas = document.createElement('canvas');
            canvas.width = cameraStream.videoWidth;
            canvas.height = cameraStream.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(cameraStream, 0, 0, canvas.width, canvas.height);
            
            // 轉為 Base64
            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
            imagePreview.src = currentImageData;
            imagePreview.classList.remove('hidden');
            uploadPlaceholder.classList.add('hidden');
            
            stopCamera();
        }

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (!keyword) {
                filteredItems = [...items];
            } else {
                filteredItems = items.filter(item => {
                    const nameMatch = item.name?.toLowerCase().includes(keyword);
                    const locationMatch = item.location?.toLowerCase().includes(keyword);
                    const dateMatch = item.date?.toLowerCase().includes(keyword);
                    const noteMatch = item.note?.toLowerCase().includes(keyword);
                    return nameMatch || locationMatch || dateMatch || noteMatch;
                });
            }
            renderItems();
        });

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) { 
                    alert("圖片請小於 2MB"); 
                    return; 
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageData = ev.target.result;
                    imagePreview.src = currentImageData;
                    imagePreview.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        foodForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            btnText.textContent = "正在同步中...";
            btnIcon.className = "fas fa-spinner fa-spin";
            
            const payload = {
                name: document.getElementById('foodName').value || "未命名",
                date: document.getElementById('foodDate').value || null,
                price: document.getElementById('foodPrice').value || 0,
                location: document.getElementById('foodLocation').value || "",
                note: document.getElementById('foodNote').value || "",
                image: currentImageData
            };

            const { error } = await supabaseClient.from('foods').insert([payload]);

            if (error) {
                alert("儲存失敗: " + error.message);
                submitBtn.disabled = false;
                btnText.textContent = "上傳食材";
                btnIcon.className = "fas fa-cloud-upload-alt";
            } else {
                window.location.reload();
            }
        });

        window.deleteItem = async (id) => {
            if (!confirm('確定要移除這項食材嗎？')) return;
            
            const { error } = await supabaseClient.from('foods').delete().eq('id', id);
            
            if (error) {
                alert("刪除失敗: " + error.message);
            } else {
                window.location.reload();
            }
        };

        function renderItems() {
            if (filteredItems.length === 0) {
                foodList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            foodList.innerHTML = filteredItems.map(item => `
                <div class="list-card rounded-2xl p-4 shadow-sm flex flex-col gap-3 animate-fadeIn">
                    <div class="flex gap-4">
                        <div class="w-20 h-20 bg-[#F0EAE0] rounded-xl overflow-hidden flex-shrink-0">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-[#D6C7B1]"><i class="fas fa-utensils"></i></div>`}
                        </div>
                        <div class="flex-1 flex flex-col justify-between overflow-hidden">
                            <div>
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-gray-700 truncate">${item.name}</h3>
                                    <button onclick="deleteItem(${item.id})" class="text-gray-300 hover:text-red-400 transition-colors pl-2"><i class="fas fa-times"></i></button>
                                </div>
                                <div class="text-[14px] text-gray-400 mt-1 flex flex-col gap-1">
                                    <span><i class="far fa-calendar-alt mr-1"></i>${item.date || '未註記'}</span>
                                    <span><i class="fas fa-map-marker-alt mr-1"></i>${item.location || '未註記'}</span>
                                </div>
                            </div>
                            <div class="flex justify-between items-end mt-2">
                                <span class="font-bold theme-text">$${item.price}</span>
                            </div>
                        </div>
                    </div>
                    ${item.note ? `
                        <div class="mt-1 pt-3 border-t border-gray-100">
                            <p class="text-[12px] text-gray-500 line-clamp-2 italic"><i class="far fa-sticky-note mr-1 text-gray-300"></i>${item.note}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
