<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食材小管家</title>
    <link rel="icon" href="foodicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --theme-color: #D9A05B; 
            --bg-color: #F5EFE6; 
            --card-bg: #FFFBF5;
            --input-border: #E8DFD0;
            --text-muted: #8E8171; 
            --text-main: #4A443C;
        } 
        
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.6) 0%, transparent 80%);
            background-attachment: fixed;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
        }

        .theme-text { color: var(--theme-color); }
        .theme-bg { background-color: var(--theme-color); }
        
        .app-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--theme-color);
            letter-spacing: 0.05em;
        }

        .solid-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.06);
            border: 1px solid rgba(217, 160, 91, 0.15);
        }

        .custom-input {
            width: 100%;
            padding: 0.875rem 1rem; 
            border-radius: 0.75rem;
            border: 1.5px solid var(--input-border);
            background: #FFFFFF;
            transition: all 0.2s ease;
            outline: none;
            font-size: 16px; 
        }
        
        .custom-input:focus {
            border-color: var(--theme-color);
            box-shadow: 0 0 0 3px rgba(217, 160, 91, 0.1);
        }

        .edit-input {
            background: transparent;
            border: 1px solid transparent;
            border-bottom: 1px dashed var(--theme-color);
            padding: 2px 4px;
            outline: none;
            width: 100%;
            font-weight: inherit;
            color: inherit;
        }

        .edit-input:focus {
            background: #fff;
            border: 1px solid var(--theme-color);
            border-radius: 4px;
        }

        .search-container {
            position: relative;
            background: #FFFFFF;
            border-radius: 1.25rem;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.1);
            border: 2px solid rgba(217, 160, 91, 0.2);
            transition: all 0.3s ease;
        }
        
        .search-container:focus-within {
            border-color: var(--theme-color);
            box-shadow: 0 6px 15px rgba(217, 160, 91, 0.15);
            transform: translateY(-1px);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--theme-color);
            font-size: 1.1rem;
            font-weight: 900;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.25rem;
            border-radius: 1rem;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            color: var(--text-main);
        }

        .search-input::placeholder {
            color: #BCB0A1;
        }

        .label-text {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        #imageInput { display: none; }
        
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.4s;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }

        .list-card {
            background: var(--card-bg);
            border: 1px solid rgba(217, 160, 91, 0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .list-card.editing {
            border: 2px solid var(--theme-color);
            box-shadow: 0 0 15px rgba(217, 160, 91, 0.2);
        }
        
        .info-tag {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(232, 223, 208, 0.3);
            padding: 2px 8px;
            border-radius: 6px;
            width: fit-content;
        }

        #cameraContainer {
            display: none;
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }

        .counter-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #FFFFFF;
            border: 1px solid var(--input-border);
            color: var(--theme-color);
            transition: all 0.2s;
        }
        .counter-btn:active {
            background: var(--theme-color);
            color: white;
            transform: scale(0.9);
        }

        .btn-save { background-color: #4CAF50; color: white; }
        .btn-cancel { background-color: #f44336; color: white; }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-[#D9A05B] border-t-transparent mb-4"></div>
        <p class="theme-text font-bold tracking-widest">載入中</p>
    </div>

    <div class="max-w-xl mx-auto min-h-screen px-5 py-8">
        <header class="text-center mb-8">
            <div class="app-title">
                <i class="fas fa-carrot"></i> 食材小管家
            </div>
        </header>

        <!-- 新增表單 -->
        <section class="solid-card p-6 mb-8 animate-fadeIn">
            <h2 class="text-md font-bold mb-5 flex items-center gap-2 theme-text border-b border-orange-100 pb-3">
                <i class="fas fa-plus-circle"></i> 新增食材
            </h2>
            <form id="foodForm" class="space-y-4">
                <div>
                    <label class="label-text">名稱</label>
                    <input type="text" id="foodName" placeholder="點擊輸入..." class="custom-input" required>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">購買日期</label>
                        <input type="date" id="foodDate" class="custom-input text-gray-600">
                    </div>
                    <div>
                        <label class="label-text">價格</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                            <input type="number" id="foodPrice" placeholder="0" class="custom-input pl-7">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="label-text">存放地方</label>
                        <input type="text" id="foodLocation" placeholder="點擊輸入..." class="custom-input">
                    </div>
                    <div>
                        <label class="label-text">初始數量</label>
                        <input type="number" id="foodQuantity" value="1" min="1" class="custom-input">
                    </div>
                </div>

                <div>
                    <label class="label-text">備註</label>
                    <textarea id="foodNote" placeholder="補充說明..." class="custom-input h-24 resize-none"></textarea>
                </div>

                <div class="pt-2">
                    <div class="flex justify-between items-center mb-3">
                        <label class="label-text mb-0">照片</label>
                        <button type="button" onclick="startCamera()" class="text-sm font-bold theme-text bg-orange-50 px-4 py-2 rounded-full active:bg-orange-100 transition-all">
                            <i class="fas fa-camera mr-1"></i> 使用相機
                        </button>
                    </div>

                    <div id="cameraContainer" class="mb-3 shadow-inner">
                        <video id="cameraStream" autoplay playsinline class="w-full h-full object-cover"></video>
                        <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-6">
                            <button type="button" onclick="takeSnapshot()" class="bg-white text-orange-500 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform border-4 border-orange-100">
                                <i class="fas fa-camera text-2xl"></i>
                            </button>
                            <button type="button" onclick="stopCamera()" class="bg-gray-800/80 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                    </div>

                    <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
                        class="h-44 border-2 border-dashed border-[#E8DFD0] rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-[#D9A05B] transition-all bg-white/60 overflow-hidden relative shadow-sm">
                        <div id="uploadPlaceholder" class="text-center">
                            <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-2">
                                <i class="fas fa-image text-orange-300 text-xl"></i>
                            </div>
                            <p class="text-sm text-gray-400 font-medium">點擊上傳照片</p>
                        </div>
                        <img id="imagePreview" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <button type="submit" id="submitBtn" class="w-full theme-bg text-white font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 mt-6 text-lg">
                    <span id="btnText">確認上傳</span>
                    <i id="btnIcon" class="fas fa-check-circle"></i>
                </button>
            </form>
        </section>

        <!-- 搜尋列 -->
        <div class="mb-6 animate-fadeIn" style="animation-delay: 0.1s;">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="搜尋食材、存放地方、日期或備註..." 
                    class="search-input">
            </div>
        </div>

        <!-- 食材列表 -->
        <div id="foodList" class="space-y-4"></div>
        
        <div id="emptyState" class="hidden py-20 text-center">
            <div class="bg-orange-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-orange-100">
                <i class="fas fa-box-open text-orange-200 text-3xl"></i>
            </div>
            <p class="text-gray-400 font-medium">倉庫空空如也 &gt;_&lt;</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eqjrudcgmryavwbjaecm.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxanJ1ZGNnbXJ5YXZ3YmphZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjkzODgsImV4cCI6MjA4NzAwNTM4OH0.Tl9UvO41jlRPRmfw-bA6t5s_qMKQjHAfINUJRoRnB4A';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let items = [];
        let filteredItems = [];
        let currentImageData = null;
        let stream = null;
        let editingId = null;

        const foodForm = document.getElementById('foodForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const foodList = document.getElementById('foodList');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const searchInput = document.getElementById('searchInput');
        const cameraContainer = document.getElementById('cameraContainer');
        const cameraStream = document.getElementById('cameraStream');
        const dropZone = document.getElementById('dropZone');

        async function init() {
            try {
                const { data, error } = await supabaseClient
                    .from('foods')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                items = data || [];
                filteredItems = [...items];
                renderItems();
                
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 400);
            } catch (err) {
                console.error("Initialization Error:", err);
            }
        }

        // 相機功能
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                cameraStream.srcObject = stream;
                cameraContainer.style.display = 'block';
                dropZone.style.display = 'none';
            } catch (err) {
                alert("無法開啟相機，請檢查權限設置。");
            }
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); }
            cameraContainer.style.display = 'none';
            dropZone.style.display = 'flex';
        }

        function takeSnapshot() {
            const canvas = document.createElement('canvas');
            canvas.width = cameraStream.videoWidth;
            canvas.height = cameraStream.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(cameraStream, 0, 0, canvas.width, canvas.height);
            currentImageData = canvas.toDataURL('image/jpeg', 0.7);
            imagePreview.src = currentImageData;
            imagePreview.classList.remove('hidden');
            uploadPlaceholder.classList.add('hidden');
            stopCamera();
        }

        // 搜尋功能
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            filteredItems = items.filter(item => 
                (item.name?.toLowerCase().includes(keyword)) ||
                (item.location?.toLowerCase().includes(keyword)) ||
                (item.date?.toLowerCase().includes(keyword)) ||
                (item.note?.toLowerCase().includes(keyword))
            );
            renderItems();
        });

        // 圖片上傳預覽
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImageData = ev.target.result;
                    imagePreview.src = currentImageData;
                    imagePreview.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // 新增食材
        foodForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            btnText.textContent = "儲存中...";
            btnIcon.className = "fas fa-spinner fa-spin";
            
            const payload = {
                name: document.getElementById('foodName').value || "未命名食材",
                date: document.getElementById('foodDate').value || null,
                price: document.getElementById('foodPrice').value || 0,
                location: document.getElementById('foodLocation').value || "",
                quantity: parseInt(document.getElementById('foodQuantity').value) || 1,
                note: document.getElementById('foodNote').value || "",
                image: currentImageData
            };

            const { error } = await supabaseClient.from('foods').insert([payload]);
            if (error) {
                alert("儲存失敗: " + error.message);
                submitBtn.disabled = false;
                btnText.textContent = "確認上傳";
                btnIcon.className = "fas fa-check-circle";
            } else {
                await init();
                foodForm.reset();
                currentImageData = null;
                imagePreview.src = "";
                imagePreview.classList.add('hidden');
                uploadPlaceholder.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.textContent = "確認上傳";
                btnIcon.className = "fas fa-check-circle";
            }
        });

        // 修改與儲存
        window.toggleEdit = (id) => {
            if (editingId === id) return; // 已經在編輯中
            editingId = id;
            renderItems();
        };

        window.cancelEdit = (e) => {
            e.stopPropagation();
            editingId = null;
            renderItems();
        };

        window.saveEdit = async (e, id) => {
            e.stopPropagation();
            const card = document.querySelector(`.list-card[data-id="${id}"]`);
            const updatedPayload = {
                name: card.querySelector('.edit-name').value,
                date: card.querySelector('.edit-date').value || null,
                price: parseInt(card.querySelector('.edit-price').value) || 0,
                location: card.querySelector('.edit-location').value,
                note: card.querySelector('.edit-note').value
            };

            const { error } = await supabaseClient
                .from('foods')
                .update(updatedPayload)
                .eq('id', id);

            if (error) {
                alert("更新失敗: " + error.message);
            } else {
                editingId = null;
                await init();
            }
        };

        // 數量增減
        window.updateQuantity = async (e, id, delta) => {
            e.stopPropagation();
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            const newQty = Math.max(0, (item.quantity || 0) + delta);
            if (newQty === item.quantity) return;

            item.quantity = newQty;
            renderItems();

            const { error } = await supabaseClient
                .from('foods')
                .update({ quantity: newQty })
                .eq('id', id);

            if (error) {
                console.error("更新數量失敗", error);
                await init();
            }
        };

        // 刪除
        window.deleteItem = async (e, id) => {
            e.stopPropagation();
            if (!confirm('要刪除這個項目嗎？')) return;
            const { error } = await supabaseClient.from('foods').delete().eq('id', id);
            if (error) alert("刪除失敗"); else await init();
        };

        // 渲染列表
        function renderItems() {
            if (filteredItems.length === 0) {
                foodList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            foodList.innerHTML = filteredItems.map(item => {
                const isEditing = editingId === item.id;
                
                return `
                <div class="list-card rounded-2xl p-5 shadow-sm animate-fadeIn relative ${isEditing ? 'editing' : ''}" 
                     data-id="${item.id}"
                     onclick="${!isEditing ? `toggleEdit(${item.id})` : ''}">
                    
                    <!-- 刪除按鈕 -->
                    <button onclick="deleteItem(event, ${item.id})" class="absolute top-4 right-4 text-gray-300 hover:text-red-400 p-2 z-10">
                        <i class="fas fa-trash-alt text-sm"></i>
                    </button>
                    
                    <div class="flex gap-5">
                        <!-- 圖片展示 -->
                        <div class="w-24 h-24 bg-orange-50 rounded-2xl overflow-hidden flex-shrink-0 shadow-inner border border-orange-100/50">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : 
                            `<div class="w-full h-full flex items-center justify-center text-orange-200"><i class="fas fa-utensils text-2xl"></i></div>`}
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <!-- 名稱編輯或展示 -->
                                ${isEditing ? 
                                    `<input type="text" class="edit-name edit-input text-lg font-bold mb-2" value="${item.name}" placeholder="名稱">` : 
                                    `<h3 class="font-bold text-lg text-gray-800 mb-2 truncate pr-6">${item.name}</h3>`
                                }
                                
                                <div class="space-y-1.5">
                                    <!-- 日期 -->
                                    <div class="info-tag">
                                        <i class="far fa-calendar-alt mr-2 opacity-70"></i>
                                        ${isEditing ? 
                                            `<input type="date" class="edit-date edit-input text-xs" value="${item.date || ''}">` : 
                                            (item.date || '未註記')
                                        }
                                    </div>
                                    <!-- 地點 -->
                                    <div class="info-tag">
                                        <i class="fas fa-map-marker-alt mr-2 opacity-70"></i>
                                        ${isEditing ? 
                                            `<input type="text" class="edit-location edit-input text-xs" value="${item.location || ''}" placeholder="地點">` : 
                                            (item.location || '未註記')
                                        }
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-3 flex justify-between items-end">
                                <!-- 價格 -->
                                <div class="flex items-center theme-text font-black text-xl">
                                    <small class="text-sm mr-1 font-bold">$</small>
                                    ${isEditing ? 
                                        `<input type="number" class="edit-price edit-input w-20" value="${item.price || 0}">` : 
                                        item.price
                                    }
                                </div>
                                
                                <!-- 數量計數器 (編輯時不可用) -->
                                <div class="flex items-center gap-3 bg-white px-2 py-1 rounded-xl border border-orange-50 shadow-sm ${isEditing ? 'opacity-30' : ''}">
                                    <button onclick="updateQuantity(event, ${item.id}, -1)" class="counter-btn text-xs" ${isEditing ? 'disabled' : ''}>
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <span class="font-bold text-gray-700 w-6 text-center">${item.quantity || 0}</span>
                                    <button onclick="updateQuantity(event, ${item.id}, 1)" class="counter-btn text-xs" ${isEditing ? 'disabled' : ''}>
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 備註區 -->
                    <div class="mt-4 pt-3 border-t border-dashed border-orange-100">
                        ${isEditing ? 
                            `<textarea class="edit-note edit-input text-sm h-16" placeholder="備註...">${item.note || ''}</textarea>` : 
                            (item.note ? `<p class="text-sm text-gray-500 leading-relaxed"><i class="far fa-sticky-note mr-2 text-orange-200"></i>${item.note}</p>` : '')
                        }
                    </div>

                    <!-- 編輯動作按鈕 -->
                    ${isEditing ? `
                        <div class="mt-4 flex gap-2 justify-end">
                            <button onclick="cancelEdit(event)" class="px-4 py-2 rounded-lg text-sm font-bold bg-gray-100 text-gray-500">取消</button>
                            <button onclick="saveEdit(event, ${item.id})" class="px-4 py-2 rounded-lg text-sm font-bold theme-bg text-white">儲存修改</button>
                        </div>
                    ` : ''}
                </div>
            `;}).join('');
        }

        init();
    </script>
</body>
</html>
